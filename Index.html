<!DOCTYPE html>
<html>
<head>
  <title>Generador de BIO</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background: #111;
      color: white;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 200px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: #E1306C;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      margin: 5px;
    }

    .box {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      margin: 20px auto;
      max-width: 400px;
    }
  </style>
</head>

<body>

<h1>✨ Generador para Instagram</h1>

<div class="box">
  <h2>BIO</h2>
  <input id="profesion" placeholder="Tu profesión">
  <br>
  <button onclick="generarBio()">Generar</button>
  <div id="resultado"></div>
</div>

<div class="box">
  <h2>Hashtags</h2>
  <input id="tema" placeholder="Tema">
  <br>
  <button onclick="generarHashtags()">Generar</button>
  <div id="hashtags"></div>
</div>

<div class="box">
  <h2>Post</h2>
  <input id="temaPost" placeholder="Tema del post">
  <br>
  <button onclick="generarPost()">Generar</button>
  <div id="post"></div>
</div>

<script>
function generarBio() {
  let profesion = document.getElementById("profesion").value;

  let bios = [
    "✨ " + profesion + " | Inspirando cada día",
    "🚀 " + profesion + " | Creciendo sin límites",
    "🔥 " + profesion + " | Pasión por lo que hago",
    "💡 " + profesion + " | Ideas que suman"
  ];

  let resultado = "";
  for (let i = 0; i < bios.length; i++) {
    resultado += "<p>" + bios[i] + "</p>";
  }

  document.getElementById("resultado").innerHTML = resultado;
}

function generarHashtags() {
  let tema = document.getElementById("tema").value;

  let tags = [
    "#" + tema,
    "#" + tema + "life",
    "#" + tema + "daily",
    "#" + tema + "love",
    "#" + tema + "community"
  ];

  document.getElementById("hashtags").innerHTML = tags.join(" ");
}

function generarPost() {
  let tema = document.getElementById("temaPost").value;

  let post =
    "🔥 3 consejos sobre " + tema + "<br><br>" +
    "1️⃣ Empieza hoy<br>" +
    "2️⃣ Sé constante<br>" +
    "3️⃣ Cree en ti<br><br>" +
    "Guarda este post si te sirve 🙌";

  document.getElementById("post").innerHTML = post;
}
</script>

</body>
</html>
