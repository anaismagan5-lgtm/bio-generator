
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de BIO para Instagram</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 40px;
            /* He puesto un color de fondo gris claro para que se vea el texto, 
               puedes cambiarlo por tu gradiente después */
            background: #f0f0f0; 
            color: white;
        }

        .tarjeta {
            background: white;
            color: black;
            padding: 20px;
            margin: 20px auto;
            border-radius: 10px;
            width: 80%;
            max-width: 400px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="tarjeta">
    <h1>Mi Bio de Instagram</h1>
    <p>Escribe tu nombre:</p>
    <input type="text" id="nombre" placeholder="Ej. Ana">
    
    <p>Cuéntanos sobre ti:</p>
    <textarea id="descripcion" placeholder="Ej. Amante de la fotografía..."></textarea>
    
    <button onclick="generarBio()">Generar Bio</button>

    <div id="resultado" style="margin-top: 20px; font-weight: bold;"></div>
</div>
