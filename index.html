
<!DOCTYPE html>
<html>
<head>
  <title>Generador de BIO</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background: #111;
      color: white;
    }

    input {
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background: #E1306C;
      color: white;
      cursor: pointer;
    }

    #resultado {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>✨ Generador de BIO</h1>

<input id="profesion" placeholder="Escribe tu profesión">
<br>

<button onclick="generar()">Generar</button>

<div id="resultado"></div>

<script>
function generar() {
  let profesion = document.getElementById("profesion").value;

  let bios = [
    "✨ " + profesion + " | Inspirando cada día",
    "🔥 " + profesion + " | Construyendo sueños",
    "🚀 " + profesion + " | Creciendo siempre",
    "💡 " + profesion + " | Creatividad diaria"
  ];

  let random = bios[Math.floor(Math.random() * bios.length)];

  document.getElementById("resultado").innerText = random;
}
</script>

</body>
</html>
