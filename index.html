<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG AI Tools 🚀</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #4c1d95);
    color: white;
    display: flex;
    justify-content: center;
    padding: 20px;
    transition: 0.3s;
}

.light {
    background: #f3f4f6;
    color: black;
}

.container {
    width: 100%;
    max-width: 420px;
}

h1 {
    text-align: center;
}

.tool {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

.resultado {
    background: white;
    color: black;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
    min-height: 40px;
}
</style>
</head>

<body>

<div class="container">
<h1>IG AI Tools 🤖</h1>

<button onclick="toggleModo()">🌙 / ☀️ Modo</button>

<select id="tono">
<option value="pro">Profesional</option>
<option value="fun">Divertido</option>
<option value="aesthetic">Aesthetic</option>
<option value="influencer">Influencer</option>
</select>

<input id="tema" placeholder="Ej: fitness, viajes...">

<div class="tool">
<h2>✨ Bio Generator IA</h2>
<button onclick="generarBio()">Generar Bio</button>
<button onclick="copiar()">Copiar</button>
<button onclick="descargar()">Descargar Imagen</button>
<div id="bio" class="resultado"></div>
</div>

<div class="tool">
<h2>📜 Historial</h2>
<div id="historial"></div>
</div>

</div>

<script>
function toggleModo(){
    document.body.classList.toggle("light");
}

function generarBio(){
    let tema = document.getElementById("tema").value;
    let tono = document.getElementById("tono").value;

    if(!tema) return alert("Escribe algo");

    let bios = {
        pro: `🚀 Experto en ${tema} | Creciendo cada día 📈`,
        fun: `😂 Viviendo la vida con ${tema} 🔥`,
        aesthetic: `✨ ${tema} vibes only 🌙`,
        influencer: `📸 Compartiendo mi mundo de ${tema} 💫`
    };

    let resultado = bios[tono];

    document.getElementById("bio").innerText = resultado;

    guardarHistorial(resultado);
}

function copiar(){
    let texto = document.getElementById("bio").innerText;
    navigator.clipboard.writeText(texto);
    alert("Copiado 🔥");
}

function descargar(){
    html2canvas(document.getElementById("bio")).then(canvas => {
        let link = document.createElement("a");
        link.download = "bio.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

function guardarHistorial(texto){
    let historial = JSON.parse(localStorage.getItem("historial")) || [];
    historial.unshift(texto);
    localStorage.setItem("historial", JSON.stringify(historial));
    mostrarHistorial();
}

function mostrarHistorial(){
    let historial = JSON.parse(localStorage.getItem("historial")) || [];
    document.getElementById("historial").innerHTML =
        historial.map(h => `<div>${h}</div>`).join("");
}

window.onload = mostrarHistorial;
</script>

</body>
</html>
